{% extends'indexadmin.html'%}
{%block body%}

<body>
<form action="adding_expert" method="post">
  <table width="200" border="1" id="customers">
  <tr>
    <th scope="row">NAME</th>
    <td><label>
      <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">EXPERIENCE</th>
    <td><label>
      <input type="text" name="textfield2" required  pattern="[0-9]{2}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">GENDER</th>
    <td><label>
      <input name="ra" type="radio" value="MALE" />
      MALE<br />
      <input name="ra" type="radio" value="FEMALE" />
    FEMALE<br />
    <input name="ra" type="radio" value="OTHER" />
    OTHER
    </label></td>
  </tr>
  <tr>
    <th scope="row">PLACE</th>
    <td><label>
      <input type="text" name="textfield3" required pattern="[A-Z a-z.]{3,25}" />
    </label></td>
  </tr>
  <tr>
    <th>PHONE</th>
    <td><label>
      <input type name="textfield4" required pattern="[6789][0-9]{9}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">EMAIL</th>
    <td><label>
      <input type="text" name="textfield5" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">USER_NAME</th>
    <td><label>
      <input type="text" name="textfield6" required pattern="[A-Z a-z.]{3,25}"/>
    </label></td>
  </tr>
  <tr>
    <th scope="row">PASSWORD</th>
    <td><label>
      <input type="password" name="textfield7" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required />
    </label></td>
  </tr>
  <tr>
    <th colspan="2" scope="row"><label>
      <input type="submit" name="Submit" value="SAVE" />
    </label></th>
    </tr>
</table>
</form>
</body>
{%endblock%}
