
{%extends 'index.html'%}
{%block body%}

<style>
#log {
  font-family: Arial, Helvetica, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

#log td, #customers th {
  padding: 8px;
  color: blue;

}

#log tr:nth-child(even){background-color: #blue;}

#log tr:hover {background-color: #ffc107;}

#log th {
  padding-top: 12px;
  padding-bottom: 12px;
  text-align: center;
  background-color: #red;
  color:white;
  font-size: 20px;
}
</style>


<body>
<form id="form1" name="form1" method="post" action="/login">
  <table width="200" border="0" id="log" align="center">
    <tr>
      <th scope="row"><b>USERNAME</b></th>
      <td><label>
        <input type="text" name="textfield" required />
      </label></td>
    </tr>
    <tr>
      <th scope="row"><b>PASSWORD</b></th>
      <td><label>
        <input type="password" name="textfield2" required/>
      </label></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><label>
        <input type="submit" name="Submit" value="Login" />
      </label></th>
    </tr>
  </table>
</form>
</body>
{%endblock%}
