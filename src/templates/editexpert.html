{% extends'indexexpert.html'%}
{%block body%}

<body>
<form action="/expert_edit" method="post">
  <table width="200" border="1">
  <tr>
    <th scope="row">NAME</th>
    <td><label>
      <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}"value="{{value[2]}}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">EXPERIENCE</th>
    <td><label>
      <input type="text" name="textfield2" required  pattern="[0-9]{2}"value="{{value[3]}}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">GENDER</th>
    <td><label>
      <input name="ra" type="radio" value="MALE"  {% if value[4]=="MALE"%} CHECKED {%endif%}  />
      MALE<br />
      <input name="ra" type="radio" value="FEMALE" {% if value[4]=="FEMALE"%} CHECKED {%endif%} />
    FEMALE<br />
    <input name="ra" type="radio" value="OTHER" {% if value[4]=="OTHER"%} CHECKED {%endif%} />
    OTHER
    </label></td>
  </tr>
  <tr>
    <th scope="row">PLACE</th>
    <td><label>
      <input type="text" name="textfield3" required pattern="[A-Z a-z.]{3,25}"value="{{value[5]}}" />
    </label></td>
  </tr>
  <tr>
    <th>PHONE</th>
    <td><label>
      <input type name="textfield4" required pattern="[6789][0-9]{9}"value="{{value[6]}}" />
    </label></td>
  </tr>
  <tr>
    <th scope="row">EMAIL</th>
    <td><label>
      <input type="text" name="textfield5" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}"value="{{value[7]}}" />
    </label></td>
  </tr>
    <tr>
    <th colspan="2" scope="row"><label>
      <input type="submit" name="Submit" value="UPDATE" />
    </label></th>
    </tr>
</table>
</form>
</body>
{%endblock%}
